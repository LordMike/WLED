[platformio]
default_envs = mbw_attic, mbw_cupboard, mbw_kid
build_cache_dir = .buildcache

[lordmike_esp32_base]
extends = env:esp32dev
custom_usermods =
build_unflags =
  ${common.build_unflags}
  -D WLED_ENABLE_GIF
  -D WLED_ENABLE_DMX_INPUT
build_flags =
  ${common.build_flags} ${esp32_idf_V4.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_2D
  -D WLED_DISABLE_PIXELFORGE
  -D WLED_DISABLE_ESPNOW
  -D WLED_DISABLE_PARTICLESYSTEM1D
  -D WLED_DISABLE_PARTICLESYSTEM2D
lib_deps =
  esp32async/AsyncTCP @ 3.4.7
  https://github.com/Makuna/NeoPixelBus.git#a0919d1c10696614625978dd6fb750a1317a14ce
  https://github.com/Aircoookie/ESPAsyncWebServer.git#v2.4.2
  marvinroger/AsyncMqttClient @ 0.9.0

[env:mbw_attic]
extends = lordmike_esp32_base
custom_usermods =
  AHT10
  INA226
build_flags =
  ${lordmike_esp32_base.build_flags}
  -D WLED_RELEASE_NAME=\"MBW-ATTIC\"
  ; -D WLED_DISABLE_MQTT
  ; -D USERMOD_AHT10_DEBUG
  ; -D USERMOD_INA226_DEBUG
  ; -D WLED_USE_PARALLEL_I2S
  -D WLED_NO_I2S0_PIXELBUS
  -D WLED_NO_I2S1_PIXELBUS

[env:mbw_cupboard]
extends = lordmike_esp32_base
build_flags =
  ${lordmike_esp32_base.build_flags}
  -D WLED_RELEASE_NAME=\"MBW-CUPBOARD\"

[env:mbw_kid]
extends = lordmike_esp32_base
build_flags =
  ${lordmike_esp32_base.build_flags}
  -D WLED_RELEASE_NAME=\"MBW-KID\"
