[platformio]
default_envs = esp32dev, pxp, pxp_aht10_ina226
build_cache_dir = .buildcache

[pxp_esp32_base]
extends = env:esp32dev
build_flags =
  ${env:esp32dev.build_flags}
  -D WLED_ENABLE_PXP
  -D WLED_ENABLE_PXP_TIMING

[env:pxp]
extends = pxp_esp32_base
build_flags =
  ${pxp_esp32_base.build_flags}
  -D WLED_RELEASE_NAME=\"PXP\"

[env:pxp_aht10_ina226]
extends = pxp_esp32_base
custom_usermods =
  ${env:esp32dev.custom_usermods}
  AHT10
  INA226
build_flags =
  ${pxp_esp32_base.build_flags}
  -D WLED_RELEASE_NAME=\"PXP_AHT10_INA226\"
  ; -D WLED_DISABLE_MQTT
  ; -D USERMOD_AHT10_DEBUG
  ; -D USERMOD_INA226_DEBUG
